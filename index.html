<!doctype html>

<html lang="en-US">

<head>
	<title>昆特牌 经典版 — 《巫师3：狂猎》</title>
	<meta charset="utf-8" />
	<meta name="author" content="Arun Sundaram" />
	<meta name="description" content="Play the original Gwent minigame from The Witcher 3 in your browser! Includes cards from Hearts of Stone and Blood & Wine!" />
	<meta name="keywords" content="arun, sundaram, programmer, gwent, tw3, witcher, card, game, gamedev, play" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" type="text/css" href="style.css" />
</head>

<body>

<div id="dimensions" style="position:fixed;width:100vw;height:calc(100vw * 1080 / 1920);"></div>

<div id="youtube"></div>

<main>

	<section id="click-background" class="noclick"></section>

	<section id="panel-left" class="panel">

		<div id="exit-game" data-title="退出游戏"></div>
	
		<div id="leader-op" class="leader-box">
			<div class="leader-container center" data-title="查看领袖"> 
			</div>
			<div class="leader-active">
				<div></div>
			</div>
		</div>
		
		<section id="stats-op" class="stats">
			<div class="profile-img">
				<div><div></div></div>
			</div>
			
			<div id="name-op" class="name">对手</div>
			<div id="deck-name-op" class="deck-name"></div>
			
			<div id="hand-count-op" class="hand-count">6</div>
			
			<div id="gem1-op" class="gem gem-on bg-contain"></div>
			<div id="gem2-op" class="gem gem-on bg-contain"></div>
			
			<div id="score-total-op" class="score-total"><div class="center">0</div></div>
			
			<div id="passed-op">已弃权</div>
			
		</section>
		
		<div id="weather" class="card-container">
		</div>
		
		<section id="stats-me" class="stats">
			<div class="profile-img">
				<div><div></div></div>
			</div>
			<div id="passed-me">已弃权</div>
			<div id="hand-count-me" class="hand-count">5</div>
			
			<div id="gem1-me" class="gem gem-on bg-contain"></div>
			<div id="gem2-me" class="gem gem-on bg-contain"></div>
			
			<div id="name-me" class="name"></div>
			<div id="deck-name-me" class="deck-name"></div>
			
			<div id="score-total-me" class="score-total"><div class="center">0</div></div>
			
			
		</section>
		
		<div id="leader-me" class="leader-box">
			<div class="leader-container center" data-title="使用领袖技能"></div>
			<div class="leader-active">
				<div></div>
			</div>
		</div>
		
		<div id="pass-button" class="center" data-title="放弃本回合">弃权</div>
		
	</section>
	
	<section id="panel-mid" class="panel">
		<section id="field-op" class="field">
			<div class="field-row" data-row="siege">
				<div class="row-score center">12</div>
				<div class="row-special card-container"></div>
				<div class="row-cards card-container"></div>
				<div class="row-weather"></div>
			</div>
			<div class="field-row" data-row="ranged">
				<div class="row-score center">0</div>
				<div class="row-special card-container"></div>
				<div class="row-cards card-container"></div>
				<div class="row-weather"></div>
			</div>
			<div class="field-row" data-row="close">
				<div class="row-score center">0</div>
				<div class="row-special card-container"></div>
				<div class="row-cards card-container"></div>
				<div class="row-weather"></div>
			</div>
		</section>
		
		<section id="field-me" class="field">
			<div class="field-row" data-row="close">
				<div class="row-score center">0</div>
				<div class="row-special card-container"></div>
				<div class="row-cards card-container"></div>
				<div class="row-weather"></div>
			</div>
			<div class="field-row" data-row="ranged">
				<div class="row-score center">0</div>
				<div class="row-special card-container"></div>
				<div class="row-cards card-container"></div>
				<div class="row-weather"></div>
			</div>
			<div class="field-row" data-row="siege">
				<div class="row-score center">0</div>
				<div class="row-special card-container"></div>
				<div class="row-cards card-container"></div>
				<div class="row-weather"></div>
			</div>
		</section>
		
		<section id="field-hand">
			<div id="hand-row" class="card-container card-selectable">
			</div>
		</section>
	</section>
	
	<section id="panel-right" class="panel">
		<div id="grave-op" class="grave cardpile" data-title="查看坟场">
		</div>
		<div id="deck-op" class="cardpile">
		
		</div>
		<div id="grave-me" class="grave cardpile" data-title="查看坟场">
		</div>
		<div id="deck-me" class="cardpile">
		</div>
	</section>
	
	<div id="hand-op"></div>
	
	<section class="card-preview hide">
		<div class="card-lg"></div>
		<div class="card-description">
			<div></div>
			<h1></h1>
			<p></p>
		</div>
	</section>
	
	<section id="carousel" class="hide">
		<div>
			<div class="card-lg" onclick="Carousel.curr.shift(event,-2)" onmouseover="Carousel.curr?.nudge(-2)"></div>
			<div class="card-lg" onclick="Carousel.curr.shift(event,-1)" onmouseover="Carousel.curr?.nudge(-1)"></div>
			<div class="card-lg" onclick="Carousel.curr.select(event)"   onmouseover="Carousel.curr?.nudge( 0)"></div>
			<div class="card-lg" onclick="Carousel.curr.shift(event, 1)" onmouseover="Carousel.curr?.nudge( 1)"></div>
			<div class="card-lg" onclick="Carousel.curr.shift(event, 2)" onmouseover="Carousel.curr?.nudge( 2)"></div>
		</div>
		<div class="card-description">
			<div></div>
			<h1></h1>
			<p></p>
		</div>
		<div></div>
	</section>
	
	
	<section id="popup" class="center hide">
		<div>
			<h3></h3>
			<p></p>
			<div>
				<button onclick="Popup.curr.selectYes()"></button>
				<button onclick="Popup.curr.selectNo()"></button>
			</div>
		</div>
	</section>
	
	
	<section id="notification-bar" class="hide">
		<div></div>
	</section>
	
	<section id="end-screen" class="hide">
		<div></div>
		<table>
			<colgroup>
				<col span="3" />
				<col span="1" />
				<col span="1" />
				<col span="1" />
			</colgroup>
			<tbody>
				<tr>
					<th colspan="2"></th>
					<th>第1局</th>
					<th>第2局</th>
					<th>第3局</th>
				</tr>
				<tr>
					<th colspan="2">杰洛特</th>
					<td>0</td>
					<td>0</td>
					<td>0</td>
				</tr>
				<tr>
					<th colspan="2">对手</th>
					<td>0</td>
					<td>0</td>
					<td>0</td>
				</tr>
			</tbody>
		</table>
		<p class="hide">比赛不能以平局结束。你可以使用相同卡组重新比赛或认输。</p>
		<button>自定义卡组</button>
		<button>重新比赛</button>
		<button>新游戏</button>
	</section>
	
	<section id="deck-selector">
		
	</section>
	

</main>

<section id="deck-customization">
	<div id="faction-title" class="center">
		<h1></h1>
	</div>
	<p id="faction-description"></p>
	
	<label id="upload-deck" class="deck-options">
		<input type="file" id="add-file" value="Import" style="display:none;"/>
		上传卡组
	</label>
	
	<a id="change-faction" class="deck-options">更换阵营</a>
	
	<a id="download-deck" class="deck-options">下载卡组</a>
	<a id="download-json" style="display:none;"></a>
	
	<h2 id="card-bank-title" class="card-contianer-title">卡牌收藏</h2>
	<h2 id="card-deck-title" class="card-contianer-title">卡组中的牌</h2>
	<div id="card-bank" class="card-array">
	</div>
	<div id="card-deck" class="card-array">
	</div>
	<div id="card-leader">
		<p>领袖</p>
		<div></div>
	</div>
	<div id="deck-stats">
		<p>卡组总牌数</p>
		<p>0</p>
		<p>单位牌数量</p>
		<p>0</p>
		<p>特殊牌</p>
		<p>0/10</p>
		<p>单位牌总战力</p>
		<p>0</p>
		<p>英雄牌</p>
		<p>0</p>
	</div>
	<button id="start-game">开始游戏</button>
	<div id="opponent-preview" class="center">
		<div>
			<p>对手的卡组</p>
		</div>
		<div class="center">
			<button id="op-preview-open" class="hide" data-title="查看对手"></button>
			<div id="op-preview-faction" class="hide"></div>
			<label id="op-preview-leader" for="add-opponent" data-title="上传对手卡组">
				<input type="file" id="add-opponent" style="display:none;"/>
				<p>随机</p>
			</label>
			<button id="op-preview-clear" class="hide" data-title="清除对手卡组"></button>
		</div>
	</div>
</section>

<div data-title="切换音乐" id="toggle-music" class="center deck-menu settings-button"><img src="svg/music.svg"></img></div>
<div data-title="切换音效" id="toggle-sfx" class="center deck-menu settings-button"><img src="svg/sfx.svg"></img></div>
<div data-title="切换游戏消息" id="toggle-notifications" class="center deck-menu settings-button"><img src="svg/notification.svg"></img></div>

<script type="text/javascript" src="common.js"></script>
<script type="text/javascript" src="cards.js"></script>
<script type="text/javascript" src="decks.js"></script>
<script type="text/javascript" src="abilities.js"></script>
<script type="text/javascript" src="factions.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<script type="text/javascript" src="gwent.js"></script>
</body>

</html>
